<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合租公共事务管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1>🏠 合租公共事务管理</h1>
                <p class="subtitle">让合租生活更和谐</p>
            </div>
            <div class="header-actions">
                <span id="currentDate" class="current-date"></span>
            </div>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="dashboard">📊 概览</button>
            <button class="tab-btn" data-tab="members">👥 成员管理</button>
            <button class="tab-btn" data-tab="tasktypes">⚙️ 任务配置</button>
            <button class="tab-btn" data-tab="records">📝 事务记录</button>
            <button class="tab-btn" data-tab="schedule">📅 轮值排班</button>
            <button class="tab-btn" data-tab="inventory">📦 物品库存</button>
            <button class="tab-btn" data-tab="bills">💰 账单管理</button>
            <button class="tab-btn" data-tab="votes">🗳️ 公共投票</button>
            <button class="tab-btn" data-tab="messages">💬 公共留言</button>
            <button class="tab-btn" data-tab="reminders">⏰ 逾期提醒</button>
        </nav>

        <main class="main-content">
            <section id="dashboard" class="tab-content active">
                <div class="stats-grid" id="dashboardStatsGrid">
                </div>

                <div class="dashboard-section">
                    <h2>🚨 待处理事项</h2>
                    <div id="pendingTasks" class="task-list">
                        <p class="empty-state">暂无待处理事项</p>
                    </div>
                </div>

                <div class="dashboard-section">
                    <h2>📋 最近动态</h2>
                    <div id="recentActivity" class="activity-list">
                        <p class="empty-state">暂无记录</p>
                    </div>
                </div>

                <div class="dashboard-section">
                    <h2>🏆 贡献排行榜</h2>
                    <div id="ranking" class="ranking-list">
                        <p class="empty-state">暂无数据</p>
                    </div>
                </div>
            </section>

            <section id="members" class="tab-content">
                <div class="section-header">
                    <h2>👥 成员管理</h2>
                    <button class="btn btn-primary" id="addMemberBtn">+ 添加成员</button>
                </div>
                <div id="membersList" class="members-grid">
                </div>
            </section>

            <section id="records" class="tab-content">
                <div class="section-header">
                    <h2>📝 事务记录</h2>
                    <button class="btn btn-primary" id="addRecordBtn">+ 添加记录</button>
                </div>

                <div class="filter-bar">
                    <select id="filterType" class="filter-select">
                        <option value="all">全部类型</option>
                    </select>
                    <select id="filterMember" class="filter-select">
                        <option value="all">全部成员</option>
                    </select>
                </div>

                <div id="recordsList" class="records-list">
                </div>
            </section>

            <section id="tasktypes" class="tab-content">
                <div class="section-header">
                    <h2>⚙️ 任务类型配置</h2>
                    <button class="btn btn-primary" id="addTaskTypeBtn">+ 添加任务类型</button>
                </div>
                <div id="taskTypesConfig">
                </div>
            </section>

            <section id="schedule" class="tab-content">
                <div class="section-header">
                    <h2>📅 轮值排班</h2>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-primary" id="addScheduleBtn">+ 新建排班</button>
                    </div>
                </div>

                <div id="scheduleActionBar" style="margin-bottom: 20px;"></div>

                <div class="schedule-grid" id="scheduleGrid">
                </div>

                <div id="scheduleRulesContainer" style="display: none;"></div>
            </section>

            <section id="inventory" class="tab-content">
                <div class="section-header">
                    <h2>📦 物品库存</h2>
                    <button class="btn btn-primary" id="addInventoryBtn">+ 添加物品</button>
                </div>

                <div id="lowStockAlert"></div>

                <div class="stats-grid"></div>

                <div class="inventory-content-grid">
                    <div class="inventory-main">
                        <div class="filter-bar">
                            <input type="text" id="invSearch" class="filter-select" placeholder="🔍 搜索物品名称...">
                            <select id="invFilterCategory" class="filter-select">
                                <option value="all">全部分类</option>
                            </select>
                            <select id="invFilterStock" class="filter-select">
                                <option value="all">全部状态</option>
                                <option value="normal">库存正常</option>
                                <option value="low">库存不足</option>
                                <option value="empty">已缺货</option>
                            </select>
                        </div>
                        <div id="inventoryItems" class="inventory-items-grid"></div>
                    </div>

                    <div class="inventory-sidebar">
                        <div class="bill-sidebar-section">
                            <div class="section-header" style="margin-bottom: 16px;">
                                <h3 style="margin: 0;">📋 变动记录</h3>
                            </div>
                            <div class="filter-bar" style="margin-bottom: 16px;">
                                <select id="invLogItemFilter" class="filter-select">
                                    <option value="all">全部物品</option>
                                </select>
                                <select id="invLogTypeFilter" class="filter-select">
                                    <option value="all">全部类型</option>
                                    <option value="consume">消耗</option>
                                    <option value="restock">补货</option>
                                    <option value="purchase">购买</option>
                                    <option value="adjust">调整</option>
                                </select>
                            </div>
                            <div id="inventoryLogs" class="inv-logs-list"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="bills" class="tab-content">
                <div class="section-header">
                    <h2>💰 账单管理</h2>
                    <button class="btn btn-primary" id="addBillBtn">+ 添加账单</button>
                </div>

                <div class="bill-summary-grid">
                    <div class="bill-summary-card">
                        <h3>本月总支出</h3>
                        <p class="bill-summary-value" id="billMonthTotal">¥0.00</p>
                    </div>
                    <div class="bill-summary-card">
                        <h3>人均分摊</h3>
                        <p class="bill-summary-value" id="billPerPerson">¥0.00</p>
                    </div>
                </div>

                <div class="bill-content-grid">
                    <div class="bill-main">
                        <div class="filter-bar">
                            <select id="billFilterCategory" class="filter-select">
                                <option value="all">全部类别</option>
                            </select>
                            <select id="billFilterMember" class="filter-select">
                                <option value="all">全部成员</option>
                            </select>
                        </div>
                        <div id="billsList" class="bills-list"></div>
                    </div>

                    <div class="bill-sidebar">
                        <div class="bill-sidebar-section">
                            <h3>📊 支出分类</h3>
                            <div id="billCategoryBreakdown"></div>
                        </div>
                        <div class="bill-sidebar-section">
                            <div class="settlement-header">
                                <h3>🤝 分摊结算</h3>
                                <div id="settlementSummary"></div>
                            </div>
                            <div id="settlementList" class="settlement-list"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="votes" class="tab-content">
                <div class="section-header">
                    <h2>🗳️ 公共投票</h2>
                    <button class="btn btn-primary" id="addVoteBtn">+ 发起投票</button>
                </div>
                <div id="votesContent"></div>
            </section>

            <section id="messages" class="tab-content">
                <div class="section-header">
                    <h2>💬 公共留言</h2>
                    <button class="btn btn-primary" id="addMessageBtn">+ 发布留言</button>
                </div>
                <div id="messagesList" class="messages-list">
                </div>
            </section>

            <section id="reminders" class="tab-content">
                <div class="section-header">
                    <h2>⏰ 逾期提醒</h2>
                </div>
                <div id="remindersList" class="reminders-list">
                </div>
            </section>
        </main>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle">标题</h3>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
